<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solidark Showcase</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="model-panel" aria-label="Showcase models">
        <h1>Solidark Showcase</h1>
        <div class="model-list" data-model-list></div>
      </aside>
      <section class="workbench" aria-live="polite">
        <header class="model-header">
          <div>
            <p data-level></p>
            <h2 data-title></h2>
          </div>
          <p data-summary></p>
        </header>
        <div class="viewer-surface" data-viewer></div>
        <pre class="model-details" data-details></pre>
        <div class="model-preview" data-preview hidden></div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
