<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solidark Showcase</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="importmap">
      {
        "imports": {
          "opencascade.js": "/node_modules/opencascade.js/dist/opencascade.wasm.js",
          "three": "/node_modules/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="model-panel" aria-label="Showcase models">
        <h1>Solidark Showcase</h1>
        <div class="model-list" data-model-list></div>
      </aside>
      <section class="workbench" aria-live="polite">
        <header class="model-header">
          <div>
            <p data-level></p>
            <h2 data-title></h2>
          </div>
          <div class="export-actions" data-export-actions aria-label="Export selected model">
            <button type="button" data-export-step disabled>STEP</button>
            <button type="button" data-export-stl disabled>STL</button>
            <button type="button" data-export-brep disabled>BREP</button>
          </div>
          <p data-summary></p>
        </header>
        <section class="model-stage">
          <sol-viewer class="viewer-surface" data-viewer></sol-viewer>
          <section class="source-panel" aria-label="Selected model source">
            <header class="source-header">
              <h3>HTML Source</h3>
              <span data-source-path></span>
            </header>
            <pre class="model-source"><code data-source-code></code></pre>
          </section>
        </section>
        <pre class="model-details" data-details></pre>
        <div class="model-preview" data-preview hidden></div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
