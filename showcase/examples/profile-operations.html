<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solidark Profile Operations</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="importmap">
      {
        "imports": {
          "opencascade.js": "/node_modules/opencascade.js/dist/opencascade.wasm.js",
          "three": "/node_modules/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="standalone-shell">
      <header class="standalone-header">
        <a href="../">Showcase</a>
        <p>Advanced HTML-authored model</p>
        <h1>Profile Operations</h1>
      </header>
      <sol-model id="profile-operations" class="source-model" data-showcase-model>
        <sol-color value="#4f7cac">
          <sol-translate by="-42 0 0">
            <sol-extrude height="16">
              <sol-rectangle size="20 14"></sol-rectangle>
            </sol-extrude>
          </sol-translate>
        </sol-color>
        <sol-color value="#d28f2d">
          <sol-revolve axis="0 1 0" angle="360">
            <sol-polygon points="10 -7 0 15 -7 0 15 7 0 10 7 0" stride="3"></sol-polygon>
          </sol-revolve>
        </sol-color>
        <sol-color value="#2f9f7b">
          <sol-translate by="0 -24 0">
            <sol-extrude height="6">
              <sol-ellipse radius-x="10" radius-y="5"></sol-ellipse>
            </sol-extrude>
          </sol-translate>
        </sol-color>
        <sol-translate by="42 0 0">
          <sol-sweep>
            <sol-color value="#ff0000">
              <sol-rectangle size="8 8"></sol-rectangle>
            </sol-color>
            <sol-sketch>
              <sol-move point="-18 0 0"></sol-move>
              <sol-arc through="-9 10 0" point="0 12 0"></sol-arc>
              <sol-arc through="9 10 0" point="18 0 0"></sol-arc>
            </sol-sketch>
          </sol-sweep>
        </sol-translate>
      </sol-model>
      <sol-viewer class="viewer-surface" for="profile-operations"></sol-viewer>
    </main>
    <script type="module" src="../standalone.js"></script>
  </body>
</html>
