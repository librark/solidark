<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solidark Primitive Set</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="importmap">
      {
        "imports": {
          "opencascade.js": "/node_modules/opencascade.js/dist/opencascade.wasm.js"
        }
      }
    </script>
    <script type="module" src="/node_modules/@google/model-viewer/dist/model-viewer.min.js"></script>
  </head>
  <body>
    <main class="standalone-shell">
      <header class="standalone-header">
        <a href="../">Showcase</a>
        <p>Basic declarative HTML</p>
        <h1>Primitive Set</h1>
      </header>
      <sol-model id="primitive-set" class="source-model" data-showcase-model>
        <sol-group>
          <sol-translate by="-48 0 0">
            <sol-cuboid size="24 24 24"></sol-cuboid>
          </sol-translate>
          <sol-translate by="-18 0 0">
            <sol-cylinder radius="10" height="28"></sol-cylinder>
          </sol-translate>
          <sol-translate by="16 0 0">
            <sol-sphere radius="14"></sol-sphere>
          </sol-translate>
          <sol-translate by="48 0 0">
            <sol-cone radius1="12" radius2="4" height="30"></sol-cone>
          </sol-translate>
          <sol-translate by="82 0 0">
            <sol-torus major-radius="12" minor-radius="3"></sol-torus>
          </sol-translate>
        </sol-group>
      </sol-model>
      <sol-viewer class="viewer-surface" for="primitive-set"></sol-viewer>
    </main>
    <script type="module" src="../standalone.js"></script>
  </body>
</html>
