<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solidark Notched Wheel</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="importmap">
      {
        "imports": {
          "opencascade.js": "/node_modules/opencascade.js/dist/opencascade.wasm.js",
          "three": "/node_modules/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="standalone-shell">
      <header class="standalone-header">
        <a href="../">Showcase</a>
        <p>Intermediate declarative HTML</p>
        <h1>Notched Wheel</h1>
      </header>
      <sol-model id="notched-wheel" class="source-model" data-showcase-model>
        <sol-difference>
          <sol-cylinder radius="36" height="10"></sol-cylinder>
          <sol-cylinder radius="10" height="18"></sol-cylinder>
          <sol-rotate by="0 0 0">
            <sol-translate by="36 0 0">
              <sol-cuboid size="14 8 18"></sol-cuboid>
            </sol-translate>
          </sol-rotate>
          <sol-rotate by="0 0 45">
            <sol-translate by="36 0 0">
              <sol-cuboid size="14 8 18"></sol-cuboid>
            </sol-translate>
          </sol-rotate>
          <sol-rotate by="0 0 90">
            <sol-translate by="36 0 0">
              <sol-cuboid size="14 8 18"></sol-cuboid>
            </sol-translate>
          </sol-rotate>
          <sol-rotate by="0 0 135">
            <sol-translate by="36 0 0">
              <sol-cuboid size="14 8 18"></sol-cuboid>
            </sol-translate>
          </sol-rotate>
        </sol-difference>
      </sol-model>
      <sol-viewer class="viewer-surface" for="notched-wheel"></sol-viewer>
    </main>
    <script type="module" src="../standalone.js"></script>
  </body>
</html>
